name: CI — Build & Page Smoke Test

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  frontend-build-and-smoke:
    name: Build Frontend & Verify Page
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Start server (standalone)
        run: |
          node .next/standalone/server.js &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
        env:
          PORT: 3000
          HOSTNAME: "0.0.0.0"

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3000/ -o /dev/null; then
              echo "✅ Server is up"
              exit 0
            fi
            echo "Waiting... ($i/15)"
            sleep 2
          done
          echo "❌ Server did not become ready in time"
          exit 1

      - name: Smoke test — homepage returns HTTP 200
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:3000/)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Homepage returned $STATUS — expected 200"
            exit 1
          fi
          echo "✅ Homepage loaded successfully (HTTP 200)"

      - name: Smoke test — page contains expected Arabic content
        run: |
          BODY=$(curl -s http://localhost:3000/)
          if echo "$BODY" | grep -q "حلول الحياة من القرآن الكريم"; then
            echo "✅ Page content verified — Arabic heading found"
          else
            echo "❌ Expected Arabic heading not found in page response"
            exit 1
          fi

      - name: Stop server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill "$SERVER_PID" || true
          fi
