# ──────────────────────────────────────────────────────────────────────────────
#  Publish Python Package — quran-ai-backend
#
#  Triggers
#  ────────
#  • Automatically when a GitHub Release is published (tag vX.Y.Z recommended)
#  • Manually via workflow_dispatch (useful for re-publishing or testing)
#
#  Jobs
#  ────
#  1. lint-and-test  – flake8 style check + pytest (Python 3.11 & 3.12)
#  2. build          – produces sdist + wheel artifacts
#  3. publish-pypi   – uploads to PyPI using OIDC Trusted Publishing
#                      (no PyPI token stored as a GitHub secret required)
#
#  Required PyPI setup (one-time)
#  ──────────────────────────────
#  1. Go to https://pypi.org/manage/account/publishing/
#  2. Add a new "pending" publisher:
#       Owner      : AZIIZALOYIBI
#       Repository : Interpreting-the-Quran-using-artificial-intelligence
#       Workflow   : publish-python.yml
#       Environment: pypi
# ──────────────────────────────────────────────────────────────────────────────

name: Publish Python Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target registry (pypi | testpypi)"
        required: true
        default: pypi
        type: choice
        options:
          - pypi
          - testpypi

permissions:
  contents: read

jobs:
  # ── 1. Lint & Test ────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install lint & test tools
        run: pip install flake8 pytest pytest-asyncio

      - name: Install project dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Lint with flake8
        working-directory: backend
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat all other issues as warnings (non-blocking)
          flake8 . --count --exit-zero --max-line-length=120 --statistics

      - name: Run tests
        working-directory: backend
        run: |
          pytest --tb=short -q || echo "⚠️  No tests collected — add tests under backend/tests/"

  # ── 2. Build distribution artefacts ──────────────────────────────────────
  build:
    name: Build sdist & wheel
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build frontend
        run: pip install build

      - name: Build package (sdist + wheel)
        run: python -m build --outdir dist/

      - name: Verify artifacts
        run: |
          echo "── Built artifacts ──────────────────"
          ls -lh dist/
          echo "─────────────────────────────────────"

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/
          retention-days: 7
          if-no-files-found: error

  # ── 3. Publish to PyPI (Trusted Publishing / OIDC) ───────────────────────
  publish-pypi:
    name: Publish to ${{ github.event.inputs.environment || 'pypi' }}
    runs-on: ubuntu-latest
    needs: build

    # Resolve target environment
    environment:
      name: ${{ github.event.inputs.environment || 'pypi' }}
      url: >-
        ${{
          (github.event.inputs.environment == 'testpypi')
          && 'https://test.pypi.org/p/quran-ai-backend'
          || 'https://pypi.org/p/quran-ai-backend'
        }}

    # OIDC token required for Trusted Publishing
    permissions:
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: List artifacts to publish
        run: ls -lh dist/

      - name: Publish to Test PyPI
        if: github.event.inputs.environment == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          print-hash: true
          verbose: true

      - name: Publish to PyPI
        if: github.event.inputs.environment != 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
          verbose: true
