version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - quran-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_ENV=${PINECONE_ENV}
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
    depends_on:
      - db
      - redis
    networks:
      - quran-net

  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_URL=${REDIS_URL}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
    depends_on:
      - redis
    networks:
      - quran-net

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-quran_ai}
      - POSTGRES_USER=${POSTGRES_USER:-quran_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secure_password_here}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5432:5432"
    networks:
      - quran-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - quran-net

volumes:
  pgdata:

networks:
  quran-net:
    driver: bridge
